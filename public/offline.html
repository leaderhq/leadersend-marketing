<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Offline — LeaderLeads</title>
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:#f4f4f5;color:#14233D;text-align:center;padding:24px}
  .card{max-width:340px}
  .mark{display:inline-block;margin-bottom:20px}
  h1{font-size:20px;font-weight:700;margin:0 0 8px}
  p{font-size:15px;line-height:1.6;color:#52525b;margin:0 0 20px}
  a{display:inline-block;background:#54A02C;color:#fff;text-decoration:none;
    font-weight:600;font-size:15px;padding:12px 24px;border-radius:12px}
</style>
</head>
<body>
  <div class="card">
    <svg class="mark" width="48" height="48" viewBox="0 0 48 48" fill="none" aria-hidden="true">
      <path d="M10 38 L24 27 L38 38 L38 44 L24 33 L10 44 Z" fill="#54A02C"/>
      <path d="M10 26 L24 15 L38 26 L38 32 L24 21 L10 32 Z" fill="#14233D"/>
      <path d="M10 14 L24 3 L38 14 L38 20 L24 9 L10 20 Z" fill="#2E6FD4"/>
    </svg>
    <h1>You're offline</h1>
    <p>LeaderLeads needs a connection to load your card and leads. Check your network and try again.</p>
    <a href="/dashboard">Retry</a>
  </div>
</body>
</html>

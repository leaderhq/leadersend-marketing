<svg viewBox="0 0 400 240" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round">
  <rect width="400" height="240" fill="#f9f9f9" stroke="none"/>
  <!-- Desk -->
  <rect x="60" y="160" width="280" height="12" rx="2" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="80" y1="172" x2="75" y2="200" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="320" y1="172" x2="325" y2="200" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Giant pile of cards on desk -->
  <rect x="75" y="148" width="250" height="12" rx="1" fill="white" stroke="#1a1a1a" stroke-width="1.2"/>
  <rect x="80" y="137" width="240" height="12" rx="1" fill="white" stroke="#1a1a1a" stroke-width="1.2"/>
  <rect x="85" y="126" width="230" height="12" rx="1" fill="white" stroke="#1a1a1a" stroke-width="1.2"/>
  <rect x="90" y="115" width="220" height="12" rx="1" fill="white" stroke="#1a1a1a" stroke-width="1.2"/>
  <rect x="95" y="104" width="210" height="12" rx="1" fill="white" stroke="#1a1a1a" stroke-width="1.2"/>
  <rect x="100" y="93" width="200" height="12" rx="1" fill="white" stroke="#1a1a1a" stroke-width="1.2"/>
  <!-- Person sitting, hands on head (overwhelmed) -->
  <circle cx="200" cy="58" r="13" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="200" y1="71" x2="200" y2="93" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Arms raised to head -->
  <path d="M200 80 C190 72 182 60 176 55" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <path d="M200 80 C210 72 218 60 224 55" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <!-- Sweat drops -->
  <line x1="182" y1="38" x2="179" y2="30" stroke="#aaa" stroke-width="1"/>
  <line x1="200" y1="35" x2="200" y2="27" stroke="#aaa" stroke-width="1"/>
  <line x1="218" y1="38" x2="221" y2="30" stroke="#aaa" stroke-width="1"/>
  <!-- "40 cards" label -->
  <text x="200" y="215" font-family="sans-serif" font-size="12" fill="#888" stroke="none" text-anchor="middle">Monday morning: 40 cards to sort</text>
</svg>

<svg viewBox="0 0 400 240" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round">
  <rect width="400" height="240" fill="#f9f9f9" stroke="none"/>
  <!-- Two people meeting -->
  <circle cx="115" cy="78" r="13" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="115" y1="91" x2="115" y2="130" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="115" y1="106" x2="97" y2="122" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="115" y1="106" x2="140" y2="118" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="115" y1="130" x2="105" y2="155" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="115" y1="130" x2="125" y2="155" stroke="#1a1a1a" stroke-width="1.5"/>

  <circle cx="185" cy="78" r="13" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="185" y1="91" x2="185" y2="130" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="185" y1="106" x2="160" y2="118" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="185" y1="106" x2="203" y2="122" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="185" y1="130" x2="175" y2="155" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="185" y1="130" x2="195" y2="155" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Handshake / connection point -->
  <path d="M138 118 C145 122 152 122 155 118 C158 122 165 122 172 118" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <!-- Phone taking photo of both -->
  <rect x="203" y="82" width="30" height="46" rx="4" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="218" cy="90" r="6" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
  <circle cx="218" cy="90" r="2" fill="#ddd" stroke="none"/>
  <!-- Flash burst -->
  <line x1="226" y1="86" x2="230" y2="83" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="228" y1="90" x2="232" y2="90" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Photo frame -->
  <rect x="248" y="55" width="80" height="58" rx="3" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Two faces in photo -->
  <circle cx="273" cy="76" r="10" fill="#f0f0f0" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="307" cy="76" r="10" fill="#f0f0f0" stroke="#1a1a1a" stroke-width="1"/>
  <path d="M267 84 C271 88 275 88 279 84" stroke="#1a1a1a" stroke-width="1" fill="none"/>
  <path d="M301 84 C305 88 309 88 313 84" stroke="#1a1a1a" stroke-width="1" fill="none"/>
  <!-- Photo date stamp -->
  <text x="288" y="105" font-family="sans-serif" font-size="7" fill="#888" stroke="none" text-anchor="middle">Jun 9 · Expo Hall B</text>
  <!-- Two envelopes flying out (one to each person) -->
  <rect x="248" y="140" width="36" height="24" rx="2" fill="white" stroke="#1a1a1a" stroke-width="1.2"/>
  <polyline points="248,140 266,153 284,140" stroke="#1a1a1a" stroke-width="1" fill="none"/>
  <!-- Arrow to person 1 -->
  <line x1="248" y1="150" x2="155" y2="138" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3"/>
  <polyline points="158,135 155,138 159,141" stroke="#aaa" stroke-width="1" fill="none"/>
  <!-- Arrow to person 2 -->
  <line x1="284" y1="150" x2="310" y2="165" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Person 2's envelope -->
  <rect x="308" y="155" width="36" height="24" rx="2" fill="white" stroke="#1a1a1a" stroke-width="1.2"/>
  <polyline points="308,155 326,168 344,155" stroke="#1a1a1a" stroke-width="1" fill="none"/>
  <text x="200" y="218" font-family="sans-serif" font-size="11" fill="#555" stroke="none" text-anchor="middle">Both of you remember. Both of you follow up.</text>
</svg>

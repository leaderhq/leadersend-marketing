<svg viewBox="0 0 400 240" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round">
  <rect width="400" height="240" fill="#f9f9f9" stroke="none"/>
  <!-- Person holding a leaky net/bucket -->
  <circle cx="160" cy="60" r="13" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="160" y1="73" x2="160" y2="115" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="160" y1="86" x2="140" y2="108" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="160" y1="86" x2="185" y2="100" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="160" y1="115" x2="148" y2="138" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="160" y1="115" x2="172" y2="138" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Bucket/net with holes -->
  <path d="M180 98 L220 98 L210 148 L190 148 Z" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Holes in bucket -->
  <circle cx="195" cy="112" r="4" fill="#f9f9f9" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="207" cy="126" r="4" fill="#f9f9f9" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="195" cy="135" r="3" fill="#f9f9f9" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Small prospect figures leaking out -->
  <g stroke="#888" stroke-width="1">
    <circle cx="240" cy="115" r="6"/>
    <line x1="240" y1="121" x2="240" y2="135"/>
    <line x1="240" y1="127" x2="234" y2="133"/>
    <line x1="240" y1="127" x2="246" y2="133"/>
    <!-- walking arrow -->
    <line x1="248" y1="125" x2="260" y2="125"/>
    <polyline points="256,121 260,125 256,129"/>
  </g>
  <g stroke="#888" stroke-width="1">
    <circle cx="270" cy="130" r="6"/>
    <line x1="270" y1="136" x2="270" y2="150"/>
    <line x1="270" y1="142" x2="264" y2="148"/>
    <line x1="270" y1="142" x2="276" y2="148"/>
    <line x1="278" y1="140" x2="290" y2="140"/>
    <polyline points="286,136 290,140 286,144"/>
  </g>
  <g stroke="#888" stroke-width="1">
    <circle cx="253" cy="155" r="6"/>
    <line x1="253" y1="161" x2="253" y2="175"/>
    <line x1="253" y1="167" x2="247" y2="173"/>
    <line x1="253" y1="167" x2="259" y2="173"/>
    <line x1="261" y1="165" x2="273" y2="165"/>
    <polyline points="269,161 273,165 269,169"/>
  </g>
  <!-- Distressed expression lines above head -->
  <line x1="148" y1="40" x2="145" y2="32" stroke="#aaa" stroke-width="1"/>
  <line x1="155" y1="37" x2="153" y2="29" stroke="#aaa" stroke-width="1"/>
  <line x1="162" y1="37" x2="162" y2="28" stroke="#aaa" stroke-width="1"/>
  <text x="75" y="185" font-family="sans-serif" font-size="11" fill="#888" stroke="none" text-anchor="middle">Prospects are</text>
  <text x="75" y="200" font-family="sans-serif" font-size="11" fill="#888" stroke="none" text-anchor="middle">slipping away</text>
</svg>

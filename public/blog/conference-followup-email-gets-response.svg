<svg viewBox="0 0 400 240" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round">
  <rect width="400" height="240" fill="#f9f9f9" stroke="none"/>
  <!-- Person at laptop -->
  <circle cx="100" cy="80" r="13" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="100" y1="93" x2="100" y2="132" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="100" y1="108" x2="83" y2="125" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="100" y1="108" x2="117" y2="118" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="100" y1="132" x2="90" y2="155" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="100" y1="132" x2="110" y2="155" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Desk -->
  <rect x="50" y="155" width="120" height="8" rx="2" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Laptop on desk -->
  <rect x="55" y="120" width="75" height="36" rx="3" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="50" y="156" width="85" height="5" rx="2" fill="white" stroke="#1a1a1a" stroke-width="1.2"/>
  <!-- Email compose on screen -->
  <rect x="60" y="125" width="65" height="26" rx="1" fill="#f5f5f5" stroke="#aaa" stroke-width="1"/>
  <line x1="64" y1="131" x2="120" y2="131" stroke="#ddd" stroke-width="1"/>
  <line x1="64" y1="136" x2="110" y2="136" stroke="#ddd" stroke-width="1"/>
  <line x1="64" y1="141" x2="115" y2="141" stroke="#ddd" stroke-width="1"/>
  <!-- Large envelope flying out -->
  <rect x="175" y="85" width="90" height="60" rx="4" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <polyline points="175,85 220,120 265,85" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <line x1="175" y1="145" x2="205" y2="118" stroke="#1a1a1a" stroke-width="1.2"/>
  <line x1="265" y1="145" x2="235" y2="118" stroke="#1a1a1a" stroke-width="1.2"/>
  <!-- Arrow showing send -->
  <line x1="155" y1="130" x2="172" y2="115" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polyline points="169,112 172,115 168,119" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <!-- Reply envelope -->
  <rect x="295" y="110" width="70" height="46" rx="3" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <polyline points="295,110 330,132 365,110" stroke="#1a1a1a" stroke-width="1.2" fill="none"/>
  <!-- Reply arrow -->
  <line x1="280" y1="128" x2="292" y2="128" stroke="#1a1a1a" stroke-width="1.5"/>
  <polyline points="279,124 275,128 279,132" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <text x="330" y="175" font-family="sans-serif" font-size="10" fill="#3F7A1F" stroke="none" text-anchor="middle">REPLY</text>
  <text x="200" y="220" font-family="sans-serif" font-size="11" fill="#555" stroke="none" text-anchor="middle">The follow-up they actually remember</text>
</svg>

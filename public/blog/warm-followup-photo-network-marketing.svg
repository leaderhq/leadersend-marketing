<svg viewBox="0 0 400 240" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round">
  <rect width="400" height="240" fill="#f9f9f9" stroke="none"/>
  <!-- Two people together -->
  <circle cx="155" cy="68" r="13" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="155" y1="81" x2="155" y2="120" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="155" y1="95" x2="138" y2="112" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="155" y1="95" x2="172" y2="108" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="155" y1="120" x2="145" y2="145" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="155" y1="120" x2="165" y2="145" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="200" cy="68" r="13" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="200" y1="81" x2="200" y2="120" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="200" y1="95" x2="183" y2="108" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="200" y1="95" x2="218" y2="108" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="200" y1="120" x2="190" y2="145" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="200" y1="120" x2="210" y2="145" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Phone taking selfie -->
  <rect x="210" y="72" width="32" height="48" rx="4" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Camera lens on back -->
  <circle cx="226" cy="80" r="5" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="226" cy="80" r="2" fill="#ddd" stroke="#1a1a1a" stroke-width="0.5"/>
  <!-- Flash -->
  <line x1="234" y1="78" x2="238" y2="76" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Photo frame floating -->
  <rect x="260" y="55" width="100" height="70" rx="4" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Mini faces in photo -->
  <circle cx="290" cy="80" r="10" fill="#f0f0f0" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="320" cy="80" r="10" fill="#f0f0f0" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Photo caption area -->
  <line x1="268" y1="112" x2="352" y2="112" stroke="#ddd" stroke-width="1"/>
  <!-- Envelope going out from photo to person -->
  <rect x="290" y="145" width="40" height="28" rx="2" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <polyline points="290,145 310,162 330,145" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <!-- Arrow from envelope to person -->
  <line x1="290" y1="158" x2="220" y2="175" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="4 3"/>
  <polyline points="224,171 220,175 225,178" stroke="#1a1a1a" stroke-width="1" fill="none"/>
  <text x="200" y="220" font-family="sans-serif" font-size="11" fill="#555" stroke="none" text-anchor="middle">Memory emailed to both of you</text>
</svg>

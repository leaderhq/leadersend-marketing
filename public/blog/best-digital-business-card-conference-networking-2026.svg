<svg viewBox="0 0 400 240" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round">
  <rect width="400" height="240" fill="#f9f9f9" stroke="none"/>
  <!-- Conference table -->
  <ellipse cx="200" cy="155" rx="160" ry="30" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Person 1 at table left -->
  <g stroke="#1a1a1a" stroke-width="1.5">
    <circle cx="80" cy="118" r="12" fill="white"/>
    <line x1="80" y1="130" x2="80" y2="155"/>
    <line x1="80" y1="141" x2="68" y2="152"/>
    <line x1="80" y1="141" x2="92" y2="149"/>
  </g>
  <!-- Person 2 right of center with phone/QR -->
  <g stroke="#1a1a1a" stroke-width="1.5">
    <circle cx="240" cy="100" r="13" fill="white"/>
    <line x1="240" y1="113" x2="240" y2="148"/>
    <line x1="240" y1="126" x2="225" y2="140"/>
    <line x1="240" y1="126" x2="255" y2="138"/>
    <line x1="240" y1="148" x2="232" y2="165"/>
    <line x1="240" y1="148" x2="248" y2="165"/>
  </g>
  <!-- Phone held up showing QR -->
  <rect x="255" y="103" width="30" height="46" rx="4" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="259" y="108" width="22" height="22" rx="1" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Mini QR pattern -->
  <rect x="261" y="110" width="5" height="5" fill="#1a1a1a" stroke="none"/>
  <rect x="274" y="110" width="5" height="5" fill="#1a1a1a" stroke="none"/>
  <rect x="261" y="121" width="5" height="5" fill="#1a1a1a" stroke="none"/>
  <rect x="268" y="115" width="4" height="4" fill="#1a1a1a" stroke="none"/>
  <rect x="274" y="120" width="5" height="4" fill="#1a1a1a" stroke="none"/>
  <!-- Person 1 scanning with phone -->
  <rect x="100" y="126" width="24" height="18" rx="2" fill="white" stroke="#1a1a1a" stroke-width="1.2"/>
  <!-- Scan lines from phone to QR -->
  <line x1="124" y1="132" x2="255" y2="118" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Handshake icon bottom -->
  <path d="M170 195 C175 188 180 188 185 192 C190 188 195 188 200 195" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <text x="200" y="225" font-family="sans-serif" font-size="11" fill="#555" stroke="none" text-anchor="middle">Instant connection, no app required</text>
</svg>

<svg viewBox="0 0 400 240" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round">
  <rect width="400" height="240" fill="#f9f9f9" stroke="none"/>
  <!-- Five team members each with a phone -->
  <!-- Person 1 -->
  <g stroke="#1a1a1a" stroke-width="1.5">
    <circle cx="60" cy="80" r="11" fill="white"/>
    <line x1="60" y1="91" x2="60" y2="120"/>
    <line x1="60" y1="102" x2="50" y2="112"/>
    <line x1="60" y1="102" x2="70" y2="112"/>
    <line x1="60" y1="120" x2="53" y2="138"/>
    <line x1="60" y1="120" x2="67" y2="138"/>
    <rect x="68" y="100" width="16" height="24" rx="3" fill="white" stroke-width="1"/>
    <rect x="70" y="103" width="12" height="15" rx="1" fill="#eee" stroke-width="0.5"/>
  </g>
  <!-- Person 2 -->
  <g stroke="#1a1a1a" stroke-width="1.5">
    <circle cx="130" cy="80" r="11" fill="white"/>
    <line x1="130" y1="91" x2="130" y2="120"/>
    <line x1="130" y1="102" x2="120" y2="112"/>
    <line x1="130" y1="102" x2="140" y2="112"/>
    <line x1="130" y1="120" x2="123" y2="138"/>
    <line x1="130" y1="120" x2="137" y2="138"/>
    <rect x="138" y="100" width="16" height="24" rx="3" fill="white" stroke-width="1"/>
    <rect x="140" y="103" width="12" height="15" rx="1" fill="#eee" stroke-width="0.5"/>
  </g>
  <!-- Person 3 (center, slightly taller) -->
  <g stroke="#1a1a1a" stroke-width="1.5">
    <circle cx="200" cy="72" r="13" fill="white"/>
    <line x1="200" y1="85" x2="200" y2="118"/>
    <line x1="200" y1="98" x2="186" y2="112"/>
    <line x1="200" y1="98" x2="214" y2="112"/>
    <line x1="200" y1="118" x2="191" y2="138"/>
    <line x1="200" y1="118" x2="209" y2="138"/>
    <rect x="210" y="96" width="18" height="28" rx="3" fill="white" stroke-width="1"/>
    <rect x="212" y="99" width="14" height="18" rx="1" fill="#eee" stroke-width="0.5"/>
  </g>
  <!-- Person 4 -->
  <g stroke="#1a1a1a" stroke-width="1.5">
    <circle cx="270" cy="80" r="11" fill="white"/>
    <line x1="270" y1="91" x2="270" y2="120"/>
    <line x1="270" y1="102" x2="260" y2="112"/>
    <line x1="270" y1="102" x2="280" y2="112"/>
    <line x1="270" y1="120" x2="263" y2="138"/>
    <line x1="270" y1="120" x2="277" y2="138"/>
    <rect x="278" y="100" width="16" height="24" rx="3" fill="white" stroke-width="1"/>
    <rect x="280" y="103" width="12" height="15" rx="1" fill="#eee" stroke-width="0.5"/>
  </g>
  <!-- Person 5 -->
  <g stroke="#1a1a1a" stroke-width="1.5">
    <circle cx="340" cy="80" r="11" fill="white"/>
    <line x1="340" y1="91" x2="340" y2="120"/>
    <line x1="340" y1="102" x2="330" y2="112"/>
    <line x1="340" y1="102" x2="350" y2="112"/>
    <line x1="340" y1="120" x2="333" y2="138"/>
    <line x1="340" y1="120" x2="347" y2="138"/>
    <rect x="348" y="100" width="16" height="24" rx="3" fill="white" stroke-width="1"/>
    <rect x="350" y="103" width="12" height="15" rx="1" fill="#eee" stroke-width="0.5"/>
  </g>
  <!-- Connection lines between phones -->
  <line x1="84" y1="112" x2="138" y2="112" stroke="#ccc" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="154" y1="112" x2="208" y2="112" stroke="#ccc" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="228" y1="112" x2="278" y2="112" stroke="#ccc" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="294" y1="112" x2="348" y2="112" stroke="#ccc" stroke-width="1" stroke-dasharray="3 3"/>
  <!-- Free badge -->
  <rect x="160" y="168" width="80" height="28" rx="14" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="200" y="187" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a" stroke="none" text-anchor="middle">FREE</text>
  <text x="200" y="220" font-family="sans-serif" font-size="11" fill="#555" stroke="none" text-anchor="middle">Every rep gets a professional card</text>
</svg>

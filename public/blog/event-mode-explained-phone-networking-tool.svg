  <!-- Full screen QR on phone -->
  <rect x="182" y="40" width="86" height="148" rx="4" fill="#f5f5f5" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Big QR code in center -->
  <!-- Corner squares -->
  <rect x="192" y="52" width="22" height="22" rx="2" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="194" y="54" width="18" height="18" rx="1" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="197" y="57" width="12" height="12" fill="#1a1a1a" stroke="none"/>
  <rect x="236" y="52" width="22" height="22" rx="2" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="238" y="54" width="18" height="18" rx="1" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="241" y="57" width="12" height="12" fill="#1a1a1a" stroke="none"/>
  <rect x="192" y="96" width="22" height="22" rx="2" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="194" y="98" width="18" height="18" rx="1" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="197" y="101" width="12" height="12" fill="#1a1a1a" stroke="none"/>
  <!-- QR fill dots -->
  <rect x="222" y="55" width="6" height="6" fill="#1a1a1a" stroke="none"/>
  <rect x="230" y="55" width="6" height="6" fill="#1a1a1a" stroke="none"/>
  <rect x="222" y="63" width="4" height="4" fill="#1a1a1a" stroke="none"/>
  <rect x="236" y="76" width="6" height="4" fill="#1a1a1a" stroke="none"/>
  <rect x="222" y="76" width="4" height="6" fill="#1a1a1a" stroke="none"/>
  <rect x="228" y="82" width="6" height="4" fill="#1a1a1a" stroke="none"/>
  <!-- EVENT MODE label on phone -->
  <text x="225" y="130" font-family="sans-serif" font-size="8" font-weight="bold" fill="#1a1a1a" stroke="none" text-anchor="middle">EVENT MODE</text>
  <!-- Scan lines from a nearby person -->
  <circle cx="335" cy="120" r="10" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="335" y1="130" x2="335" y2="155" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="335" y1="140" x2="325" y2="150" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="335" y1="140" x2="345" y2="150" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="335" y1="155" x2="329" y2="168" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="335" y1="155" x2="341" y2="168" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="315" y1="132" x2="282" y2="114" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="200" y="220" font-family="sans-serif" font-size="11" fill="#555" stroke="none" text-anchor="middle">Hold it up. They scan. Done.</text>

<svg viewBox="0 0 400 240" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round">
  <rect width="400" height="240" fill="#f9f9f9" stroke="none"/>
  <!-- Person holding phone up high -->
  <circle cx="130" cy="100" r="13" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="130" y1="113" x2="130" y2="152" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="130" y1="130" x2="110" y2="148" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Arm raised holding phone -->
  <path d="M130 125 C140 115 155 100 165 80" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <line x1="130" y1="152" x2="120" y2="175" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="130" y1="152" x2="140" y2="175" stroke="#1a1a1a" stroke-width="1.5"/>

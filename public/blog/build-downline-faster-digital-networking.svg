<svg viewBox="0 0 400 240" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round">
  <rect width="400" height="240" fill="#f9f9f9" stroke="none"/>
  <!-- Root person at top -->
  <circle cx="200" cy="30" r="13" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="200" y1="43" x2="200" y2="68" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="200" y1="52" x2="188" y2="64" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="200" y1="52" x2="212" y2="64" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="200" y1="68" x2="192" y2="82" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="200" y1="68" x2="208" y2="82" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- phone in hand -->
  <rect x="213" y="50" width="16" height="26" rx="3" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="215" y="53" width="12" height="17" rx="1" fill="#e8e8e8" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Level 2 connectors -->
  <line x1="200" y1="43" x2="90" y2="110" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="200" y1="43" x2="200" y2="110" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="200" y1="43" x2="310" y2="110" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Level 2 people -->
  <g stroke="#1a1a1a" stroke-width="1.5">
    <circle cx="90" cy="118" r="11" fill="white"/>
    <line x1="90" y1="129" x2="90" y2="150"/>
    <line x1="90" y1="138" x2="80" y2="148"/>
    <line x1="90" y1="138" x2="100" y2="148"/>
    <line x1="90" y1="150" x2="83" y2="162"/>
    <line x1="90" y1="150" x2="97" y2="162"/>
  </g>
  <g stroke="#1a1a1a" stroke-width="1.5">
    <circle cx="200" cy="118" r="11" fill="white"/>
    <line x1="200" y1="129" x2="200" y2="150"/>
    <line x1="200" y1="138" x2="190" y2="148"/>
    <line x1="200" y1="138" x2="210" y2="148"/>
    <line x1="200" y1="150" x2="193" y2="162"/>
    <line x1="200" y1="150" x2="207" y2="162"/>
  </g>
  <g stroke="#1a1a1a" stroke-width="1.5">
    <circle cx="310" cy="118" r="11" fill="white"/>
    <line x1="310" y1="129" x2="310" y2="150"/>
    <line x1="310" y1="138" x2="300" y2="148"/>
    <line x1="310" y1="138" x2="320" y2="148"/>
    <line x1="310" y1="150" x2="303" y2="162"/>
    <line x1="310" y1="150" x2="317" y2="162"/>
  </g>
  <!-- Level 3 connectors -->
  <line x1="90" y1="129" x2="45" y2="185" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="90" y1="129" x2="130" y2="185" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="310" y1="129" x2="270" y2="185" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="310" y1="129" x2="355" y2="185" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="3 3"/>
  <!-- Level 3 small circles -->
  <circle cx="45" cy="192" r="8" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="130" cy="192" r="8" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="270" cy="192" r="8" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="355" cy="192" r="8" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="200" cy="192" r="8" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="200" y1="150" x2="200" y2="184" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="3 3"/>
  <!-- Label -->
  <text x="200" y="228" font-family="sans-serif" font-size="11" fill="#555" stroke="none" text-anchor="middle">Your downline grows itself</text>
